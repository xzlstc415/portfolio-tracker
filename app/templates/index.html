<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Portfolio Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .profit { color: #16a34a; }
    .loss { color: #dc2626; }
  </style>
</head>
<body class="h-full">
  <div class="flex h-full">

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col">
      <div class="p-5 border-b border-gray-200">
        <h1 class="text-lg font-bold text-gray-900 tracking-tight">Portfolio Tracker</h1>
      </div>

      <div class="p-4">
        <form id="create-portfolio-form" class="flex gap-2">
          <input
            id="portfolio-name-input"
            type="text"
            placeholder="New portfolio name"
            required
            class="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
          <button
            type="submit"
            class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-medium text-white hover:bg-indigo-700 transition-colors"
          >Add</button>
        </form>
      </div>

      <nav id="portfolio-list" class="flex-1 overflow-y-auto px-3 space-y-1">
        <!-- filled by JS -->
      </nav>

      <div class="p-4 border-t border-gray-200 text-xs text-gray-400">
        <span id="last-updated">Not refreshed yet</span>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">

      <!-- Empty state -->
      <div id="empty-state" class="flex-1 flex items-center justify-center text-gray-400">
        <div class="text-center">
          <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a4 4 0 004 4h10a4 4 0 004-4V7M3 7l9 6 9-6M3 7l9-4 9 4"/></svg>
          <p class="mt-2 text-sm">Select or create a portfolio to get started</p>
        </div>
      </div>

      <!-- Portfolio detail (hidden by default) -->
      <div id="portfolio-detail" class="flex-1 flex flex-col overflow-hidden hidden">

        <!-- Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
          <div>
            <h2 id="portfolio-title" class="text-xl font-semibold text-gray-900"></h2>
            <p id="portfolio-summary" class="text-sm text-gray-500 mt-0.5"></p>
          </div>
          <button
            id="add-stock-btn"
            class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 transition-colors"
          >+ Add Stock</button>
        </header>

        <!-- Stock table -->
        <div class="flex-1 overflow-auto p-6">
          <table class="min-w-full divide-y divide-gray-200" id="stocks-table">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ticker</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Company</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Market</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Price</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Change</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Qty</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Buy Price</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Mkt Value</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">P/L</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Weight</th>
                <th class="px-4 py-3"></th>
              </tr>
            </thead>
            <tbody id="stocks-tbody" class="bg-white divide-y divide-gray-200">
              <!-- filled by JS -->
            </tbody>
          </table>
          <p id="no-stocks-msg" class="text-center text-gray-400 text-sm mt-8 hidden">No stocks in this portfolio yet. Click "+ Add Stock" to begin.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Stock Modal -->
  <div id="edit-stock-modal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/40" id="edit-modal-backdrop"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 relative fade-in">
        <h3 class="text-lg font-semibold text-gray-900 mb-1">Edit Stock</h3>
        <p id="edit-stock-label" class="text-sm text-gray-500 mb-4"></p>

        <form id="edit-stock-form" class="space-y-4">
          <input type="hidden" id="edit-stock-id" />
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
              <input id="edit-qty" type="number" min="0" step="any" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Buy Price</label>
              <input id="edit-buy-price" type="number" min="0" step="any" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
          </div>
          <div class="flex justify-end gap-3 pt-2">
            <button type="button" id="edit-modal-cancel" class="rounded-lg border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">Cancel</button>
            <button type="submit" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 transition-colors">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Add Stock Modal -->
  <div id="add-stock-modal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/40" id="modal-backdrop"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 relative fade-in">
        <h3 class="text-lg font-semibold text-gray-900 mb-4">Add Stock</h3>

        <form id="add-stock-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Market</label>
            <select id="stock-market" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="us">US (NYSE / NASDAQ)</option>
              <option value="hk">Hong Kong (HKEX)</option>
              <option value="cn">China A-shares (SSE / SZSE)</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ticker Symbol</label>
            <input
              id="stock-ticker"
              type="text"
              placeholder="e.g. AAPL"
              required
              class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
            <div id="lookup-status" class="mt-1 text-xs text-gray-400"></div>
          </div>

          <!-- Lookup preview -->
          <div id="lookup-preview" class="hidden rounded-lg bg-indigo-50 p-3 text-sm space-y-1">
            <p><span class="font-medium text-gray-700">Company:</span> <span id="preview-name" class="text-gray-900"></span></p>
            <p><span class="font-medium text-gray-700">Price:</span> <span id="preview-price" class="text-gray-900"></span></p>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
              <input id="stock-qty" type="number" min="0" step="any" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Buy Price</label>
              <input id="stock-buy-price" type="number" min="0" step="any" required class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
            </div>
          </div>

          <div class="flex justify-end gap-3 pt-2">
            <button type="button" id="modal-cancel" class="rounded-lg border border-gray-300 px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">Cancel</button>
            <button type="submit" id="modal-submit" disabled class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">Add Stock</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
